<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dark mode demonstration</title>
    <!-- external style output.css -->
    <link rel="stylesheet" href="../src/output.css" />

    <!-- adding js to custom dark and lightmode throuh using schme-prefer -->
    <script>
      // On page load or when changing themes, best to add inline in `head` to avoid FOUC
      document.documentElement.classList.toggle(
        "dark",
        localStorage.theme === "dark" ||
          (!("theme" in localStorage) &&
            window.matchMedia("(prefers-color-scheme: dark)").matches),
      );
    </script>
  </head>
  <body>
    <!-- darkmode component -->
    <div
      class="bg-white dark:bg-gray-800 rounded-lg px-6 py-8 ring shadow-xl ring-gray-900/5"
    >
      <div>
        <span
          class="inline-flex items-center justify-center rounded-md bg-indigo-500 p-2 shadow-lg"
        >
          <svg class="h-6 w-6 stroke-white"></svg>
        </span>
      </div>
      <h3
        class="text-gray-900 dark:text-white mt-5 text-base font-medium tracking-tight"
      >
        Writes upside-down
      </h3>
      <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm">
        The Zero Gravity Pen can be used to write in any orientation, including
        upside-down. It even works in outer space.
      </p>
    </div>

    <!-- btn for darkmode -->
    <button class="border p-2 rounded" onclick="DarkMode()">Dark Mode 🌚</button>
    <!-- btn for lightmode -->
    <button class="border p-2 rounded" onclick="LightMode()">Light Mode 🌞</button>
  </body>
<script>
    
    // create function with darkmode
    function DarkMode(){
        window.location.reload();
        document.documentElement.classList.add="dark";
        localStorage.theme="dark";
    }

     // create function with lightmode
    function LightMode(){
        window.location.reload();
        document.documentElement.classList.remove="dark";
        localStorage.theme="light";
    }
</script>
</html>
