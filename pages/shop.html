<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Store - My Website</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    .mobile-menu { transition: transform 0.3s ease, opacity 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; }
    .product-card:hover .product-img { transform: scale(1.05); }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col">

  <!-- Sidebar Overlay -->
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/30 z-30" onclick="toggleSidebar()"></div>

  <!-- Slide-in Sidebar (mobile) -->
  <aside id="sidebar"
    class="fixed top-0 left-0 h-full w-56 bg-white dark:bg-gray-800 border-r border-gray-100 dark:border-gray-700 z-40 pt-16 transition-transform duration-300 -translate-x-full shadow-lg">
    <nav class="flex flex-col mt-4">
      <a href="../Home.html" class="flex items-center gap-3 px-5 py-3 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">Home</a>
      <a href="#" class="flex items-center gap-3 px-5 py-3 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">Shop</a>
      <a href="./ContactUs.html" class="flex items-center gap-3 px-5 py-3 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">Contact Us</a>
      <a href="./pages/About.html" class="flex items-center gap-3 px-5 py-3 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">About Us</a>
      <div class="px-5 pt-4 border-t border-gray-100 dark:border-gray-700 mt-2">
        <a href="./pages/Login.html" class="block text-center bg-green-500 text-white px-4 py-2 rounded-full hover:bg-green-600 transition-colors duration-300 text-sm">Sign Up</a>
      </div>
    </nav>
  </aside>

  <!-- NAVBAR -->
  <header class="fixed top-0 left-0 right-0 z-20 bg-white dark:bg-gray-900 shadow-sm">
    <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <button id="sidebarToggleBtn" onclick="toggleSidebar()"
          class="flex flex-col items-center justify-center gap-[5px] w-9 h-9 rounded-lg border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors focus:outline-none">
          <span id="bar1" class="block w-4 h-[1.5px] bg-gray-700 dark:bg-gray-200 rounded transition-all duration-300"></span>
          <span id="bar2" class="block w-4 h-[1.5px] bg-gray-700 dark:bg-gray-200 rounded transition-all duration-300"></span>
          <span id="bar3" class="block w-4 h-[1.5px] bg-gray-700 dark:bg-gray-200 rounded transition-all duration-300"></span>
        </button>
        <a href="#" class="text-2xl font-bold text-green-500">Logo</a>
      </div>
      <div class="hidden md:flex space-x-6">
        <a href="../Home.html" class="nav-link text-gray-700 dark:text-gray-300 hover:text-green-500 transition-colors duration-300 font-bold">Home</a>
        <a href="#" class="nav-link text-green-500 font-bold border-b-2 border-green-500">Shop</a>
        <a href="./ContactUs.html" class="nav-link text-gray-700 dark:text-gray-300 hover:text-green-500 transition-colors duration-300 font-bold">Contact Us</a>
        <a href="./pages/About.html" class="nav-link text-gray-700 dark:text-gray-300 hover:text-green-500 transition-colors duration-300 font-bold">About Us</a>
      </div>
      <div class="flex items-center space-x-4">
        <!-- Dark Mode -->
        <button id="darkModeToggle" class="text-gray-700 dark:text-gray-200 hover:text-green-500 focus:outline-none transition-colors duration-300">
          <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
          <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
        </button>
        <!-- Cart -->
        <button class="relative text-gray-700 dark:text-gray-200 hover:text-green-500 transition-colors duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
          <span id="cartCount" class="absolute -top-2 -right-2 bg-green-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">0</span>
        </button>
        <a href="./pages/Login.html" class="hidden md:inline-block bg-green-500 text-white px-4 py-2 rounded-full hover:bg-green-600 transition-colors duration-300">Sign Up</a>
        <button id="mobileMenuButton" class="md:hidden text-gray-700 dark:text-gray-200 hover:text-green-500 focus:outline-none">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </nav>
    <!-- Mobile Dropdown -->
    <div id="mobileMenu" class="mobile-menu md:hidden bg-white dark:bg-gray-800 shadow-lg w-full transform -translate-y-full opacity-0">
      <div class="container mx-auto px-4 py-4 space-y-4">
        <a href="../Home.html" class="block text-gray-700 dark:text-gray-200 hover:text-green-500 transition-colors">Home</a>
        <a href="#" class="block text-gray-700 dark:text-gray-200 hover:text-green-500 transition-colors">Shop</a>
        <a href="./ContactUs.html" class="block text-gray-700 dark:text-gray-200 hover:text-green-500 transition-colors">Contact Us</a>
        <a href="./About.html" class="block text-gray-700 dark:text-gray-200 hover:text-green-500 transition-colors">About Us</a>
        <a href="./Login.html" class="inline-block bg-green-500 text-white px-4 py-2 rounded-full hover:bg-green-600 transition-colors">Sign Up</a>
      </div>
    </div>
  </header>

  <!-- PAGE BODY -->
  <div class="flex pt-20 container mx-auto px-4 py-8 gap-8">

    <!-- LEFT: Category Sidebar -->
    <aside class="hidden md:block w-56 flex-shrink-0">
      <h2 class="text-2xl font-extrabold text-gray-800 dark:text-white mb-6">ALL PRODUCTS</h2>
      <ul class="space-y-1" id="categoryList">
        <li>
          <button onclick="selectCategory(this, 'All')"
            class="category-btn w-full text-left px-5 py-3 rounded-full bg-green-500 text-white font-medium text-sm transition-all duration-200">
            All Products
          </button>
        </li>
        <li><button onclick="selectCategory(this, 'Keyboard')" class="category-btn w-full text-left px-5 py-3 rounded-full text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 font-medium text-sm transition-all duration-200">Keyboard</button></li>
        <li><button onclick="selectCategory(this, 'Mice')" class="category-btn w-full text-left px-5 py-3 rounded-full text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 font-medium text-sm transition-all duration-200">Mice</button></li>
        <li><button onclick="selectCategory(this, 'Microphone')" class="category-btn w-full text-left px-5 py-3 rounded-full text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 font-medium text-sm transition-all duration-200">Microphone</button></li>
        <li><button onclick="selectCategory(this, 'Headset')" class="category-btn w-full text-left px-5 py-3 rounded-full text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 font-medium text-sm transition-all duration-200">Headset</button></li>
      </ul>

      <div class="mt-10">
        <h3 class="text-xl font-extrabold text-gray-800 dark:text-white mb-3">CONTACT US</h3>
        <p class="text-sm text-gray-500 dark:text-gray-400">How can I contact for business inquiries?</p>
        <a href="./ContactUs.html" class="inline-block mt-3 text-sm text-green-500 hover:underline font-medium">Send a message →</a>
      </div>
    </aside>

    <!-- RIGHT: Search + Product Grid -->
    <div class="flex-1 min-w-0">
      <!-- Search Bar -->
      <div class="relative mb-8">
        <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>
        </svg>
        <input id="searchInput" type="text" placeholder="Search..."
          class="w-full pl-12 pr-4 py-3 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-200 rounded-xl border border-transparent focus:outline-none focus:border-green-500 transition-colors text-sm"
          oninput="filterProducts()" />
      </div>

      <!-- Mobile Category Scroll -->
      <div class="flex md:hidden gap-2 overflow-x-auto pb-3 mb-6 scrollbar-hide">
        <button onclick="selectCategory(this,'All')" class="category-btn flex-shrink-0 px-4 py-2 rounded-full bg-green-500 text-white text-xs font-medium">All</button>
        <button onclick="selectCategory(this,'Keyboard')" class="category-btn flex-shrink-0 px-4 py-2 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 text-xs font-medium">Keyboard</button>
        <button onclick="selectCategory(this,'Mice')" class="category-btn flex-shrink-0 px-4 py-2 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 text-xs font-medium">Mice</button>
        <button onclick="selectCategory(this,'Microphone')" class="category-btn flex-shrink-0 px-4 py-2 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 text-xs font-medium">Microphone</button>
        <button onclick="selectCategory(this,'Headset')" class="category-btn flex-shrink-0 px-4 py-2 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 text-xs font-medium">Headset</button>
      </div>

      <!-- Product Grid -->
      <div id="productGrid" class="grid grid-cols-2 lg:grid-cols-3 gap-5"></div>

      <!-- Empty State -->
      <div id="emptyState" class="hidden text-center py-20">
        <p class="text-gray-400 dark:text-gray-500 text-lg">No products found.</p>
      </div>
    </div>
  </div>

  <script>
    const products = [
      { id:1,  name:'Razer Ornata V3 Tenkeyless - Hello Kitty Edition', price:119.99, category:'Keyboard', img:'https://assets3.razerzone.com/Mww6WQAgviLRfjJ07EG_VKaqOQ0=/300x300/https%3A%2F%2Fmedias-p1.phoenix.razer.com%2Fsys-master-phoenix-images-container%2Fh8d%2Fhcb%2F9796329373726%2Fornata-v3-tenkeyless-hello-kitty-500x500.png' },
      { id:2,  name:'Logitech Signature Slim Solar', price:99.99, category:'Keyboard', img:'https://resource.logitech.com/w_416,h_312,ar_4:3,c_pad,q_auto,f_auto,dpr_2.0/d_transparent.gif/content/dam/logitech/en/products/keyboards/solar-k980-keyboard-for-mac/off-white/gallery-images/signature-slim-solar+for-mac-wireless-keyboard-k980-off-white-typing-view-6.png' },
      { id:3,  name:'AULA S75 PRO Mechanical Keyboard', price:19.99, category:'Keyboard', img:'https://www.aulastar.com/uploads/allimg/20250725/1-250H51H514926.JPG' },
      { id:4,  name:'Razer Ornata V3', price:69.99, category:'Keyboard', img:'https://assets3.razerzone.com/JCRG_e1sCkQ15E6iooW22TlqP0o=/300x300/https%3A%2F%2Fmedias-p1.phoenix.razer.com%2Fsys-master-phoenix-images-container%2Fhfd%2Fh73%2F9533910810654%2Fornata-v3-4-500x500.png' },
      { id:5,  name:'AULA F2088 104 Keys White Punk Mechanical', price:19.99, category:'Keyboard', img:'https://www.aulastar.com/uploads/allimg/20241106/1-2411061JZ3b4.jpg' },
      { id:6,  name:'Attack Shark X85 Series', price:34.99, category:'Keyboard', img:'https://attackshark.com/cdn/shop/files/1-1_97b186dc-6902-419e-9542-7ac475d2b3dc.jpg?v=1774492165' },
      { id:7,  name:'AULA F2088 Pro Wired Mechanical Keyboard', price:19.99, category:'Keyboard', img:'https://www.aulastar.com/uploads/allimg/20241108/1-24110Q61049600.jpg' },
      { id:8,  name:'Attack Shark X98 Series', price:34.99, category:'Keyboard', img:'https://attackshark.com/cdn/shop/files/1.3.png?v=1745380753' },

      { id:9,  name:'Razer Viper V4 Pro - White', price:154.99, category:'Mice', img:'https://assets3.razerzone.com/V_ROn1uwZTtCNoOLjBRGWrYqS48=/300x300/https%3A%2F%2Fmedias-p1.phoenix.razer.com%2Fsys-master-phoenix-images-container%2Fh57%2Fh60%2F10039373201438%2Fviper-v4-pro-white-2-500x500.png' },
      { id:10, name:'Razer Naga V2 Pro', price:179.99, category:'Mice', img:'https://assets3.razerzone.com/y265A8on-spu30uzfYMFCzGGBpU=/300x300/https%3A%2F%2Fmedias-p1.phoenix.razer.com%2Fsys-master-phoenix-images-container%2Fhb2%2Fhb9%2F9529652379678%2Fnaga-v2-pro-2-500x500.png' },
      { id:11, name:'Razer Naga Left-Handed Edition', price:99.99, category:'Mice', img:'https://assets3.razerzone.com/yVd7fP8Z4ibH0AxLPvpk16aelJA=/300x300/https%3A%2F%2Fmedias-p1.phoenix.razer.com%2Fsys-master-phoenix-images-container%2Fh09%2Fhba%2F9529652346910%2Fnaga-left-handed-2-500x500.png' },
      { id:12, name:'Attack Shark X3 Series', price:45.99, category:'Mice', img:'https://attackshark.com/cdn/shop/files/attackshark_x3_gaming_mouse_fanghua020049_7da5426f-ccbb-4c7c-9cb9-08d675c63fae.jpg?v=1750248841' },
      { id:13, name:'Attack Shark X11SE Series', price:30.99, category:'Mice', img:'https://attackshark.com/cdn/shop/files/X11SE_f3b97056-9e95-48dc-935d-93e97b28012c.jpg?v=1755841792' },
      { id:14, name:'AULA SC900 Gaming Mouse', price:59.99, category:'Mice', img:'https://www.aulastar.com/uploads/allimg/20250528/1-25052Q40150H6.jpg' },
      { id:15, name:'AULA SC620 Gaming Mouse', price:44.99, category:'Mice', img:'https://www.aulastar.com/uploads/allimg/20260303/1-26030311563b50.png' },
      { id:16, name:'Logitech M720 Triathlon', price:49.99, category:'Mice', img:'https://resource.logitech.com/w_416,h_312,ar_4:3,c_pad,q_auto,f_auto,dpr_2.0/d_transparent.gif/content/dam/logitech/en/products/mice/m720/gallery/m720-gallery-2a.png' },

      { id:17, name:'Blue Yeti USB Microphone', price:99.99, category:'Microphone', img:'https://m.media-amazon.com/images/I/61RMFIkGTjL._AC_SL1500_.jpg' },
      { id:18, name:'HyperX QuadCast S Microphone', price:159.99, category:'Microphone', img:'https://m.media-amazon.com/images/I/61YkNXHIIiL._AC_SL1500_.jpg' },
      { id:19, name:'Razer Seiren V3 Chroma', price:129.99, category:'Microphone', img:'https://assets3.razerzone.com/ERCN4SaYJOABpBGwQ5Yb0fOnwz4=/300x300/https%3A%2F%2Fmedias-p1.phoenix.razer.com%2Fsys-master-phoenix-images-container%2Fhe8%2Fh35%2F10162975604766%2Fseiren-v3-chroma-500x500.png' },
      { id:20, name:'Elgato Wave:3 Microphone', price:149.99, category:'Microphone', img:'https://m.media-amazon.com/images/I/51A1SHNt0qL._AC_SL1200_.jpg' },
      { id:21, name:'SteelSeries Alias Pro Microphone', price:179.99, category:'Microphone', img:'https://m.media-amazon.com/images/I/41eG4vRV+AL._AC_SL1200_.jpg' },
      { id:22, name:'Rode NT-USB Mini Microphone', price:99.00, category:'Microphone', img:'https://m.media-amazon.com/images/I/51R7FSRQCKL._AC_SL1200_.jpg' },

      { id:23, name:'Razer BlackShark V2', price:24.99, category:'Headset', img:'https://cdn11.bigcommerce.com/s-q8jsr/images/stencil/1280x1280/products/3402/21690/Razer_BlackShark_V2_-_Wired_Gaming_Headset_USB_Sound_Card_-_Special_Edition__44742.1674806728.jpg?c=2' },
      { id:24, name:'Razer BlackShark V3', price:29.99, category:'Headset', img:'https://i.pinimg.com/736x/d0/a2/dc/d0a2dc94c7b753715391f99151d58142.jpg' },
      { id:25, name:'AULA A500 Tri-mode Headset with ANC', price:24.99, category:'Headset', img:'https://www.aulastar.com/uploads/allimg/20250704/1-250F415053O42.jpg' },
      { id:26, name:'HyperX Cloud Alpha Wireless', price:89.99, category:'Headset', img:'https://m.media-amazon.com/images/I/61RqR-OiJWL._AC_SL1500_.jpg' },
      { id:27, name:'SteelSeries Arctis Nova Pro', price:249.99, category:'Headset', img:'https://m.media-amazon.com/images/I/61OEdXXJaLL._AC_SL1500_.jpg' },
      { id:28, name:'Logitech G Pro X 2 Lightspeed', price:199.99, category:'Headset', img:'https://m.media-amazon.com/images/I/61OHsNIHKAL._AC_SL1500_.jpg' },
    ];

    let currentCategory = 'All';
    let cartCount = 0;

    function renderProducts() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const grid = document.getElementById('productGrid');
      const empty = document.getElementById('emptyState');
      const filtered = products.filter(p => {
        const matchCat = currentCategory === 'All' || p.category === currentCategory;
        const matchSearch = p.name.toLowerCase().includes(search);
        return matchCat && matchSearch;
      });
      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      grid.innerHTML = filtered.map(p => `
        <div class="product-card bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 overflow-hidden group cursor-pointer transition-shadow duration-300 hover:shadow-md">
          <div class="overflow-hidden bg-gray-50 dark:bg-gray-700 aspect-square flex items-center justify-center p-4">
            <img src="${p.img}" alt="${p.name}" class="product-img w-full h-full object-contain transition-transform duration-300" />
          </div>
          <div class="p-4">
            <h3 class="text-sm font-medium text-gray-800 dark:text-white leading-snug mb-1">${p.name}</h3>
            <p class="text-green-500 font-bold text-sm mb-3">$${p.price.toFixed(2)}</p>
            <button onclick="addToCart()" class="w-full bg-green-500 hover:bg-green-600 text-white text-xs font-medium py-2 rounded-full transition-colors duration-300">
              Add to Cart
            </button>
          </div>
        </div>
      `).join('');
    }

    function selectCategory(btn, cat) {
      currentCategory = cat;
      document.querySelectorAll('.category-btn').forEach(b => {
        b.classList.remove('bg-green-500', 'text-white');
        b.classList.add('text-gray-700', 'dark:text-gray-300');
      });
      btn.classList.add('bg-green-500', 'text-white');
      btn.classList.remove('text-gray-700', 'dark:text-gray-300');
      renderProducts();
    }

    function filterProducts() { renderProducts(); }

    function addToCart() {
      cartCount++;
      document.getElementById('cartCount').textContent = cartCount;
    }

    renderProducts();

    // Dark Mode
    const darkModeToggle = document.getElementById('darkModeToggle');
    const moonIcon = document.getElementById('moonIcon');
    const sunIcon = document.getElementById('sunIcon');
    let isDarkMode = false;
    function toggleDarkMode() {
      isDarkMode = !isDarkMode;
      document.documentElement.classList.toggle('dark', isDarkMode);
      moonIcon.classList.toggle('hidden', isDarkMode);
      sunIcon.classList.toggle('hidden', !isDarkMode);
    }
    darkModeToggle.addEventListener('click', toggleDarkMode);
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) toggleDarkMode();

    // Sidebar
    let sidebarOpen = false;
    function toggleSidebar() {
      sidebarOpen = !sidebarOpen;
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      const bar1 = document.getElementById('bar1');
      const bar2 = document.getElementById('bar2');
      const bar3 = document.getElementById('bar3');
      sidebar.classList.toggle('-translate-x-full', !sidebarOpen);
      overlay.classList.toggle('hidden', !sidebarOpen);
      bar1.style.transform = sidebarOpen ? 'translateY(6.5px) rotate(45deg)' : '';
      bar2.style.opacity = sidebarOpen ? '0' : '1';
      bar3.style.transform = sidebarOpen ? 'translateY(-6.5px) rotate(-45deg)' : '';
    }

    // Mobile Dropdown
    const mobileMenuButton = document.getElementById('mobileMenuButton');
    const mobileMenu = document.getElementById('mobileMenu');
    let isMobileMenuOpen = false;
    mobileMenuButton.addEventListener('click', () => {
      isMobileMenuOpen = !isMobileMenuOpen;
      if (isMobileMenuOpen) {
        mobileMenu.classList.remove('-translate-y-full', 'opacity-0');
        mobileMenu.classList.add('translate-y-0', 'opacity-100');
      } else {
        mobileMenu.classList.remove('translate-y-0', 'opacity-100');
        mobileMenu.classList.add('-translate-y-full', 'opacity-0');
      }
    });

    document.querySelectorAll('.nav-link').forEach((link, i) => {
      link.style.animationDelay = `${i * 0.1}s`;
    });
  </script>
</body>
</html>
