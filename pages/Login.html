 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>User Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { font-family: 'Poppins', sans-serif; box-sizing: border-box; }
  body { margin: 0; padding: 0; }
 
  .bg-gradient-main {
    background: linear-gradient(135deg, #86efac 0%, #22c55e 35%, #15803d 100%);
  }
 
  /* Blob panel — hidden on mobile, shown on md+ */
  .blob-panel {
    display: none;
  }
  @media (min-width: 768px) {
    .blob-panel {
      display: block;
      width: 220px;
      min-width: 220px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(160deg, #f0fdf4 0%, #dcfce7 100%);
    }
  }
 
  .blob-big {
    background: linear-gradient(135deg, #bbf7d0 0%, #4ade80 40%, #16a34a 100%);
    width: 220px; height: 220px;
    border-radius: 60% 40% 70% 30% / 50% 60% 40% 60%;
    position: absolute; top: -40px; left: -50px; opacity: 0.95;
  }
  .blob-inner {
    background: linear-gradient(135deg, #86efac 0%, #22c55e 50%, #15803d 100%);
    width: 160px; height: 170px;
    border-radius: 70% 30% 50% 60% / 60% 50% 40% 50%;
    position: absolute; top: 10px; left: -20px; opacity: 0.9;
  }
  .blob-small {
    background: linear-gradient(135deg, #a3e635 0%, #84cc16 60%, #65a30d 100%);
    width: 70px; height: 70px;
    border-radius: 50%;
    position: absolute; bottom: 38px; left: 95px; opacity: 0.95;
  }
  .blob-tiny {
    background: linear-gradient(135deg, #d9f99d 0%, #a3e635 100%);
    width: 40px; height: 40px;
    border-radius: 50%;
    position: absolute; bottom: 20px; left: 55px; opacity: 0.6;
  }
 
  /* Mobile top banner */
  .mobile-banner {
    display: block;
    width: 100%;
    height: 110px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(160deg, #f0fdf4 0%, #dcfce7 100%);
  }
  @media (min-width: 768px) {
    .mobile-banner { display: none; }
  }
  .mobile-blob-1 {
    background: linear-gradient(135deg, #bbf7d0 0%, #4ade80 40%, #16a34a 100%);
    width: 160px; height: 160px;
    border-radius: 60% 40% 70% 30% / 50% 60% 40% 60%;
    position: absolute; top: -60px; left: -40px; opacity: 0.95;
  }
  .mobile-blob-2 {
    background: linear-gradient(135deg, #86efac 0%, #22c55e 50%, #15803d 100%);
    width: 120px; height: 130px;
    border-radius: 70% 30% 50% 60% / 60% 50% 40% 50%;
    position: absolute; top: -20px; left: -10px; opacity: 0.85;
  }
  .mobile-blob-3 {
    background: linear-gradient(135deg, #a3e635 0%, #84cc16 60%);
    width: 55px; height: 55px;
    border-radius: 50%;
    position: absolute; bottom: 5px; right: 80px; opacity: 0.8;
  }
  .mobile-blob-4 {
    background: linear-gradient(135deg, #d9f99d 0%, #a3e635 100%);
    width: 35px; height: 35px;
    border-radius: 50%;
    position: absolute; top: 10px; right: 30px; opacity: 0.5;
  }
  .mobile-blob-5 {
    background: linear-gradient(135deg, #bbf7d0 0%, #4ade80 100%);
    width: 80px; height: 80px;
    border-radius: 50% 70% 40% 60%;
    position: absolute; top: -30px; right: -20px; opacity: 0.6;
  }
 
  .blob-top-right {
    background: linear-gradient(135deg, #bbf7d0 0%, #4ade80 100%);
    width: 55px; height: 55px;
    border-radius: 50% 70% 40% 60% / 60% 40% 70% 50%;
    position: absolute; top: -10px; right: -10px; opacity: 0.25;
  }
 
  .login-btn {
    background: linear-gradient(90deg, #a3e635 0%, #22c55e 50%, #15803d 100%);
    transition: opacity 0.2s, transform 0.15s;
    letter-spacing: 0.12em;
    border: none;
    cursor: pointer;
  }
  .login-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .login-btn:active { transform: scale(0.98); }
 
  .input-field {
    background: #f0fdf4;
    border: 1.5px solid #bbf7d0;
    outline: none;
    width: 100%;
    transition: background 0.2s, box-shadow 0.2s, border-color 0.2s;
  }
  .input-field:focus {
    background: #dcfce7;
    border-color: #4ade80;
    box-shadow: 0 0 0 3px rgba(74,222,128,0.18);
  }
 
  .card {
    animation: fadeUp 0.65s cubic-bezier(.22,1,.36,1) both;
    box-shadow: 0 24px 60px rgba(21,128,61,0.22), 0 4px 16px rgba(0,0,0,0.08);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(36px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
 
  .icon-color { color: #303a34; }
  .forgot-link { color: #16a34a; transition: color 0.2s; }
  .forgot-link:hover { color: #4ade80; }
  .create-link { color: #4ade80; transition: color 0.2s; }
  .create-link:hover { color: #16a34a; }
</style>
</head>
<body>
    
<div class="bg-gradient-main min-h-screen flex items-center justify-center p-3 sm:p-6">
 
  <!-- Card: stacks vertically on mobile, side-by-side on md+ -->
  <div class="card bg-white rounded-3xl overflow-hidden flex flex-col md:flex-row w-full max-w-xs sm:max-w-sm md:max-w-xl lg:max-w-2xl" style="position:relative;">
 
    <!-- Mobile top banner -->
    <div class="mobile-banner">
      <div class="mobile-blob-1"></div>
      <div class="mobile-blob-2"></div>
      <div class="mobile-blob-3"></div>
      <div class="mobile-blob-4"></div>
      <div class="mobile-blob-5"></div>
      <div style="position:absolute; bottom:12px; right:20px;">
        <p class="text-green-700 font-bold text-base tracking-wide">User Login</p>
      </div>
    </div>
 
    <!-- Left blob art panel (desktop only) -->
    <div class="blob-panel">
      <div class="blob-big"></div>
      <div class="blob-inner"></div>
      <div class="blob-small"></div>
      <div class="blob-tiny"></div>
    </div>
 
    <!-- Right / bottom form area -->
    <div class="flex flex-col justify-center flex-1 px-5 sm:px-8 py-6 sm:py-10" style="position:relative;">
      <div class="blob-top-right hidden md:block"></div>
 
      <!-- Title hidden on mobile (shown in banner), visible on md+ -->
      <h2 class="hidden md:block text-xl lg:text-2xl font-bold text-gray-800 mb-6 text-center">User Login</h2>
 
      <!-- Username -->
      <div class="relative mb-4">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 icon-color">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </span>
        <input type="text" placeholder="Username"
          class="input-field rounded-xl pl-9 pr-4 py-2.5 text-sm text-gray-600 placeholder-gray-700"/>
      </div>
 
      <!-- Password -->
      <div class="relative mb-5">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 icon-color">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </span>
        <input type="password" placeholder="Password"
          class="input-field rounded-xl pl-9 pr-4 py-2.5 text-sm text-gray-600 placeholder-gray-700"/>
      </div>
 
      <!-- Login button -->
      <button class="login-btn w-full text-white font-semibold text-sm uppercase rounded-xl py-2.5 mb-3">
        Login
      </button>
 
      <!-- Forgot -->
      <p class="text-center text-xs mb-4 cursor-pointer forgot-link font-medium">
        Forgot Username / Password?
      </p>
 
      <!-- Divider -->
      <hr class="border-green-100 mb-3"/>
 
      <!-- Create account -->
      <a href="./Create.html">
        <p class="text-center text-xs cursor-pointer create-link font-medium">
        Create Your Account →
      </p>
      </a>
    </div>
 
  </div>
</div>
</body>
</html>
</body>
</html>
